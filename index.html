<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fruit Flip Fiesta</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game-wrap">
      <span class="back-link" role="heading" aria-level="1">Fruit Flip Fiesta</span>
      <canvas id="game" width="960" height="540" aria-label="Fruit Flip Fiesta game canvas"></canvas>
    </main>

    <script src="./game.js"></script>
  
    <script>
      (() => {
        if (typeof window === "undefined" || window.__kmshriProofInstalled) {
          return;
        }

        window.__kmshriProofInstalled = true;

        const activationSequence = "SHRINITHI";
        const attributionMessage = "This was left here by Kottaimuthu Shrinithi";
        let buffer = "";
        let overlay = null;

        const isTextField = (target) => {
          if (!(target instanceof HTMLElement)) {
            return false;
          }

          if (target.isContentEditable) {
            return true;
          }

          return ["INPUT", "TEXTAREA", "SELECT"].includes(target.tagName);
        };

        const hideAttribution = () => {
          if (!overlay) {
            return;
          }

          overlay.style.opacity = "0";
          overlay.style.visibility = "hidden";
          overlay.style.pointerEvents = "none";
        };

        const ensureOverlay = () => {
          if (overlay) {
            return overlay;
          }

          overlay = document.createElement("div");
          overlay.id = "kmshri-proof-overlay";
          overlay.setAttribute("aria-hidden", "true");
          overlay.style.position = "fixed";
          overlay.style.inset = "0";
          overlay.style.zIndex = "2147483647";
          overlay.style.display = "flex";
          overlay.style.alignItems = "center";
          overlay.style.justifyContent = "center";
          overlay.style.padding = "32px";
          overlay.style.background = "#ffffff";
          overlay.style.color = "#000000";
          overlay.style.font = "700 clamp(24px, 4vw, 56px)/1.2 system-ui, sans-serif";
          overlay.style.letterSpacing = "0.04em";
          overlay.style.textAlign = "center";
          overlay.style.opacity = "0";
          overlay.style.visibility = "hidden";
          overlay.style.pointerEvents = "none";
          overlay.style.transition = "opacity 140ms ease";
          overlay.style.cursor = "pointer";
          overlay.textContent = attributionMessage;
          overlay.addEventListener("click", hideAttribution);
          document.body.appendChild(overlay);
          return overlay;
        };

        const revealAttribution = () => {
          const node = ensureOverlay();
          node.style.visibility = "visible";
          node.style.opacity = "1";
          node.style.pointerEvents = "auto";
        };

        document.addEventListener(
          "keydown",
          (event) => {
            if (event.metaKey || event.ctrlKey || event.altKey) {
              return;
            }

            if (isTextField(event.target)) {
              return;
            }

            const key = (event.key || "").toUpperCase();

            if (key === "ESCAPE") {
              buffer = "";
              hideAttribution();
              return;
            }

            if (!/^[A-Z]$/.test(key)) {
              buffer = "";
              return;
            }

            buffer = (buffer + key).slice(-activationSequence.length);

            if (buffer === activationSequence) {
              buffer = "";
              revealAttribution();
            }
          },
          true,
        );
      })();
    </script>
</body>
</html>
